<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Galaxy with stars and planets">
  <defs>
    <radialGradient id="space" cx="50%" cy="45%" r="75%">
      <stop offset="0" stop-color="#1a1b3a"/>
      <stop offset="0.55" stop-color="#0b0c20"/>
      <stop offset="1" stop-color="#060612"/>
    </radialGradient>

    <radialGradient id="neb1" cx="35%" cy="30%" r="55%">
      <stop offset="0" stop-color="#77e6ff" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#7b61ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="70%" cy="40%" r="60%">
      <stop offset="0" stop-color="#ff4fd8" stop-opacity="0.40"/>
      <stop offset="0.55" stop-color="#a7ff83" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="planet" cx="35%" cy="30%" r="70%">
      <stop offset="0" stop-color="#bdeaff"/>
      <stop offset="0.45" stop-color="#6cc9ff"/>
      <stop offset="1" stop-color="#21438b"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#77e6ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff4fd8" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#space)"/>

  <!-- Nebula clouds -->
  <g filter="url(#blur)">
    <circle cx="360" cy="250" r="320" fill="url(#neb1)"/>
    <circle cx="820" cy="300" r="380" fill="url(#neb2)"/>
    <circle cx="650" cy="610" r="420" fill="url(#neb1)" opacity="0.6"/>
  </g>

  <!-- Galaxy core swirl -->
  <g filter="url(#glow)" opacity="0.9">
    <path d="M265 430c120-150 400-235 585-120 150 93 134 248-34 318-200 84-455-4-553-142"
          fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="18" stroke-linecap="round"/>
    <path d="M325 470c110-118 340-170 480-82 112 70 94 185-36 233-156 57-350-7-444-108"
          fill="none" stroke="#77e6ff" stroke-opacity="0.35" stroke-width="12" stroke-linecap="round"/>
    <path d="M395 505c88-82 250-112 348-51 78 48 62 120-30 148-108 34-236-12-318-97"
          fill="none" stroke="#ff4fd8" stroke-opacity="0.28" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Stars -->
  <g fill="#fff">
    <circle cx="90" cy="120" r="1.5" opacity="0.9"/>
    <circle cx="160" cy="220" r="1" opacity="0.7"/>
    <circle cx="240" cy="90" r="1.2" opacity="0.8"/>
    <circle cx="320" cy="160" r="1.1" opacity="0.7"/>
    <circle cx="420" cy="110" r="1.5" opacity="0.8"/>
    <circle cx="540" cy="160" r="1" opacity="0.7"/>
    <circle cx="660" cy="120" r="1.3" opacity="0.75"/>
    <circle cx="760" cy="80" r="1.2" opacity="0.7"/>
    <circle cx="880" cy="150" r="1.6" opacity="0.85"/>
    <circle cx="1020" cy="120" r="1.1" opacity="0.7"/>
    <circle cx="1120" cy="210" r="1.4" opacity="0.8"/>
    <circle cx="1040" cy="680" r="1.2" opacity="0.7"/>
    <circle cx="920" cy="720" r="1.5" opacity="0.8"/>
    <circle cx="780" cy="690" r="1.1" opacity="0.7"/>
    <circle cx="640" cy="740" r="1.3" opacity="0.75"/>
    <circle cx="520" cy="680" r="1.2" opacity="0.7"/>
    <circle cx="380" cy="720" r="1.6" opacity="0.85"/>
    <circle cx="220" cy="700" r="1.1" opacity="0.7"/>
    <circle cx="120" cy="640" r="1.4" opacity="0.8"/>
  </g>

  <!-- Planet with ring -->
  <g transform="translate(865 520)">
    <ellipse cx="0" cy="65" rx="190" ry="44" fill="url(#ring)" opacity="0.7"/>
    <ellipse cx="0" cy="65" rx="190" ry="44" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2"/>
    <circle cx="0" cy="0" r="120" fill="url(#planet)"/>
    <circle cx="-38" cy="-38" r="22" fill="#ffffff" opacity="0.18"/>
    <path d="M-120 0a120 120 0 0 0 240 0" fill="none" stroke="#000" stroke-opacity="0.25" stroke-width="8"/>
  </g>

  <!-- Small moon -->
  <circle cx="215" cy="610" r="38" fill="#cfe9ff" opacity="0.75"/>
  <circle cx="205" cy="598" r="9" fill="#ffffff" opacity="0.18"/>
</svg>
