<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Nebula background">
  <defs>
    <radialGradient id="g1" cx="25%" cy="20%" r="70%">
      <stop offset="0" stop-color="#77e6ff" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#7b61ff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="75%" cy="30%" r="70%">
      <stop offset="0" stop-color="#a7ff83" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#ff4fd8" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="60%" cy="75%" r="75%">
      <stop offset="0" stop-color="#ffd37a" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#77e6ff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="#0b1020"/>
  <g filter="url(#softBlur)">
    <circle cx="340" cy="180" r="420" fill="url(#g1)"/>
    <circle cx="1040" cy="230" r="470" fill="url(#g2)"/>
    <circle cx="880" cy="710" r="520" fill="url(#g3)"/>
  </g>

  <!-- subtle dust -->
  <g opacity="0.20">
    <circle cx="170" cy="520" r="2" fill="#ffffff"/>
    <circle cx="220" cy="600" r="1.5" fill="#ffffff"/>
    <circle cx="1180" cy="560" r="2" fill="#ffffff"/>
    <circle cx="1020" cy="640" r="1.5" fill="#ffffff"/>
    <circle cx="760" cy="120" r="1.5" fill="#ffffff"/>
    <circle cx="640" cy="180" r="1" fill="#ffffff"/>
  </g>
</svg>
